<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Page</title>

<style>

/* ===== Base ===== */
html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  font-family: Arial, sans-serif;
  color: white;
}

/* ===== Background ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url("pexels-catota-3756766.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  z-index: -1;
}

/* ===== SAFE CONTAINER (THIS FIXES BORDER ISSUE) ===== */
.container {
  max-width: 1200px;      /* prevents stretching to edges */
  margin: 0 auto;         /* center horizontally */
  padding: 0 20px;        /* safe space from left & right */
  box-sizing: border-box;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
}


.logo {
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 3px;
  background: linear-gradient(90deg, #00f0ff, #ff00f7, #00f0ff);
  background-size: 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: gradientMove 4s linear infinite;
  margin: 0;
}

/* Animated Gradient */
@keyframes gradientMove {
  0% { background-position: 0%; }
  100% { background-position: 300%; }
}

/* Waveform */
.waveform {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 4px;
  margin-top: 8px;
  height: 25px;
}

.waveform span {
  width: 4px;
  height: 10px;
  background: #00f0ff;
  border-radius: 5px;
  animation: wave 1s infinite ease-in-out;
}

.waveform span:nth-child(1) { animation-delay: 0s; }
.waveform span:nth-child(2) { animation-delay: 0.1s; }
.waveform span:nth-child(3) { animation-delay: 0.2s; }
.waveform span:nth-child(4) { animation-delay: 0.3s; }
.waveform span:nth-child(5) { animation-delay: 0.4s; }
.waveform span:nth-child(6) { animation-delay: 0.5s; }
.waveform span:nth-child(7) { animation-delay: 0.6s; }

@keyframes wave {
  0%, 100% { height: 10px; }
  50% { height: 25px; }
}

/* Search */
.search-container {
  flex: 1;
  display: flex;
  justify-content: center;
}

.search-container input {
  width: 70%;
  max-width: 400px;
  padding: 10px 15px;
  border-radius: 25px;
  border: none;
  outline: none;
}

/* Navigation */
.nav-buttons {
  display: flex;
  gap: 10px;
}

.nav-buttons button {
  padding: 8px 14px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  background: #00f2ff;
  transition: 0.3s;
}

.nav-buttons button:hover {
  background: white;
  color: black;
}

/* Dropdown */
.dropdown {
  position: relative;
}

.dropdown-content {
  display: none;
  position: absolute;
  right: 0;
  background: rgba(0,0,0,0.9);
  border-radius: 10px;
  padding: 10px;
  min-width: 160px;
  margin-top: 5px;
}

.dropdown-content.show {
  display: block;
}

.dropdown-content a {
  display: block;
  padding: 8px;
  text-decoration: none;
  color: white;
  border-radius: 5px;
}

.dropdown-content a:hover {
  background: rgba(255,255,255,0.2);
}


/* Main Content */
.main-content {
  padding: 100px 0 40px 0;
}

</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">

    <p class="logo">WAKA MULTIMEDIA</p>

    <div class="search-container">
      <input type="text" placeholder="Search music, artists...">
    </div>

    <div class="nav-buttons">
      <button onclick="location.href='home.html'">Home</button>
      <button onclick="location.href='Discover.html'">Discover</button>
      <button onclick="location.href='upload.html'">Upload</button>

      <div class="dropdown">
        <button onclick="toggleDropdown()" id="accountBtn">Account ▼</button>
        <div class="dropdown-content" id="dropdownMenu">
          <a href="#">Profile</a>
          <a href="#">My Playlists</a>
          <a href="#">Settings</a>
          <a href="#">Notifications</a>
          <a href="#">Help Center</a>
          <a href="#">Logout</a>
        </div>
      </div>
    </div>

  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">
    <h1>Welcome </h1>
    <p>Listen, upload, download and enjoy the Malawian music.</p>
  </div>

</div>



<script>
function toggleDropdown(){
  document.getElementById("dropdownMenu").classList.toggle("show");
}

window.onclick = function(event) {
  if (!event.target.matches('#accountBtn')) {
    var dropdown = document.getElementById("dropdownMenu");
    if (dropdown.classList.contains('show')) {
      dropdown.classList.remove('show');
    }
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Page</title>

<style>

/* ===== Base ===== */
html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  font-family: Arial, sans-serif;
  color: white;
}

/* ===== Background ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url("pexels-catota-3756766.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  z-index: -1;
}

/* ===== SAFE CONTAINER ===== */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  box-sizing: border-box;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
}

.logo {
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 3px;
  background: linear-gradient(90deg, #00f0ff, #ff00f7, #00f0ff);
  background-size: 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: gradientMove 4s linear infinite;
  margin: 0;
}

@keyframes gradientMove {
  0% { background-position: 0%; }
  100% { background-position: 300%; }
}

/* Search */
.search-container {
  flex: 1;
  display: flex;
  justify-content: center;
}

.search-container input {
  width: 70%;
  max-width: 400px;
  padding: 10px 15px;
  border-radius: 25px;
  border: none;
  outline: none;
}

/* Navigation */
.nav-buttons {
  display: flex;
  gap: 10px;
}

.nav-buttons button {
  padding: 8px 14px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  background: #00f2ff;
  transition: 0.3s;
}

.nav-buttons button:hover {
  background: white;
  color: black;
}

/* Dropdown */
.dropdown {
  position: relative;
}

.dropdown-content {
  display: none;
  position: absolute;
  right: 0;
  background: rgba(0,0,0,0.9);
  border-radius: 10px;
  padding: 10px;
  min-width: 160px;
  margin-top: 5px;
}

.dropdown-content.show {
  display: block;
}

.dropdown-content a {
  display: block;
  padding: 8px;
  text-decoration: none;
  color: white;
  border-radius: 5px;
}

.dropdown-content a:hover {
  background: rgba(255,255,255,0.2);
}

/* Main Content */
.main-content {
  padding: 100px 0 40px 0;
}

/* ===== MUSIC GRID ===== */
#musicList {
  display: grid;
  grid-template-columns: repeat(4, 2in); /* 4 cards per row, 2 inches width each */
  grid-auto-rows: 2.3in; /* Height 2.3 inches */
  gap: 20px;
  justify-content: center;
}

.song {
  background: rgba(0,0,0,0.7);
  border-radius: 10px;
  padding: 10px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
}

.song img {
  width: 100%;
  height: 1.2in;
  object-fit: cover;
  border-radius: 8px;
}

.song-info {
  text-align: center;
  margin: 8px 0;
  font-size: 0.85rem;
}

.song-buttons {
  display: flex;
  gap: 5px;
  margin-top: auto;
}

.song-buttons button {
  flex: 1;
  padding: 5px;
  font-size: 0.75rem;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  background: #00f2ff;
  color: black;
  font-weight: bold;
  transition: 0.3s;
}

.song-buttons button:hover {
  background: white;
  color: black;
}

</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">

    <p class="logo">WAKA MULTIMEDIA</p>

    <div class="search-container">
      <input type="text" placeholder="Search music, artists...">
    </div>

    <div class="nav-buttons">
      <button onclick="location.href='home.html'">Home</button>
      <button onclick="location.href='Discover.html'">Discover</button>
      <button onclick="location.href='upload.html'">Upload</button>

      <div class="dropdown">
        <button onclick="toggleDropdown()" id="accountBtn">Account ▼</button>
        <div class="dropdown-content" id="dropdownMenu">
          <a href="#">Profile</a>
          <a href="#">My Playlists</a>
          <a href="#">Settings</a>
          <a href="#">Notifications</a>
          <a href="#">Help Center</a>
          <a href="#">Logout</a>
        </div>
      </div>
    </div>

  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <h1>Welcome</h1>
    <p>Listen, upload, download and enjoy the Malawian music.</p>

    <h2>Latest Uploaded Music</h2>

    <!-- MUSIC WILL LOAD HERE -->
    <div id="musicList">
      No music uploaded yet. Be the first to upload.
    </div>

  </div>

</div>

<script>

/* Dropdown */
function toggleDropdown(){
  document.getElementById("dropdownMenu").classList.toggle("show");
}

window.onclick = function(event) {
  if (!event.target.matches('#accountBtn')) {
    var dropdown = document.getElementById("dropdownMenu");
    if (dropdown.classList.contains('show')) {
      dropdown.classList.remove('show');
    }
  }
}

/* LOAD MUSIC FROM SERVER */
async function loadMusic(){

  try{

    const response = await fetch("/music");
    const songs = await response.json();

    const musicList = document.getElementById("musicList");

    musicList.innerHTML = "";

    if(songs.length === 0){
      musicList.innerHTML = "No music uploaded yet.";
      return;
    }

    songs.forEach(song => {

      const div = document.createElement("div");
      div.className = "song";

      div.innerHTML = `
        <img src="/covers/${song.cover}" alt="${song.title} cover">
        <div class="song-info">
          <b>${song.title}</b><br>
          ${song.artist}<br>
          Released: ${song.release_date}<br>
          Genre: ${song.genre}
        </div>
        <div class="song-buttons">
          <button onclick="window.location.href='/uploads/${song.filename}'">Download</button>
          <button onclick="shareSong('${song.title}', '${song.artist}')">Share</button>
          <button onclick="likeSong('${song.title}')">Like</button>
        </div>
      `;

      musicList.appendChild(div);

    });

  }
  catch(err){
    console.error("Error loading music:", err);
  }

}

/* Dummy functions for share/like */
function shareSong(title, artist){
  alert(`Share "${title}" by ${artist}`);
}

function likeSong(title){
  alert(`You liked "${title}"`);
}

loadMusic();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Page</title>

<style>

/* ===== Base ===== */
html, body {
  margin: 0;
  padding: 0;
  min-height: 100%;
  font-family: Arial, sans-serif;
  color: white;
}

/* ===== Background ===== */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: url("pexels-catota-3756766.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  z-index: -1;
}

/* ===== SAFE CONTAINER ===== */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
  box-sizing: border-box;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 15px 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
}

.logo {
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 3px;
  background: linear-gradient(90deg, #00f0ff, #ff00f7, #00f0ff);
  background-size: 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: gradientMove 4s linear infinite;
  margin: 0;
}

@keyframes gradientMove {
  0% { background-position: 0%; }
  100% { background-position: 300%; }
}

/* Search */
.search-container {
  flex: 1;
  display: flex;
  justify-content: center;
}

.search-container input {
  width: 70%;
  max-width: 400px;
  padding: 10px 15px;
  border-radius: 25px;
  border: none;
  outline: none;
}

/* Navigation */
.nav-buttons {
  display: flex;
  gap: 10px;
}

.nav-buttons button {
  padding: 8px 14px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  background: #00f2ff;
  transition: 0.3s;
}

.nav-buttons button:hover {
  background: white;
  color: black;
}

/* Dropdown */
.dropdown {
  position: relative;
}

.dropdown-content {
  display: none;
  position: absolute;
  right: 0;
  background: rgba(0,0,0,0.9);
  border-radius: 10px;
  padding: 10px;
  min-width: 160px;
  margin-top: 5px;
}

.dropdown-content.show {
  display: block;
}

.dropdown-content a {
  display: block;
  padding: 8px;
  text-decoration: none;
  color: white;
  border-radius: 5px;
}

.dropdown-content a:hover {
  background: rgba(255,255,255,0.2);
}

/* Main Content */
.main-content {
  padding: 100px 0 40px 0;
  text-align: center;
}

/* Music Grid */
#musicList {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
}

/* Music Card */
.song {
  background: rgba(0,0,0,0.6);
  border-radius: 15px;
  overflow: hidden;
  width: 250px; /* fixed width for alignment */
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 15px rgba(0,0,0,0.4);
  transition: transform 0.3s, box-shadow 0.3s;
}

.song:hover {
  transform: translateY(-5px);
  box-shadow: 0 12px 25px rgba(0,0,0,0.7);
}

.song img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.song-info {
  padding: 10px 15px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.song-info b {
  font-size: 16px;
  color: #00f0ff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.song-info span {
  font-size: 14px;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.song audio {
  width: 100%;
  margin-top: 10px;
  border-radius: 8px;
  outline: none;
  background: #222;
}
</style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">

    <p class="logo">WAKA MULTIMEDIA</p>

    <div class="search-container">
      <input type="text" placeholder="Search music, artists...">
    </div>

    <div class="nav-buttons">
      <button onclick="location.href='home.html'">Home</button>
      <button onclick="location.href='Discover.html'">Discover</button>
      <button onclick="location.href='upload.html'">Upload</button>

      <div class="dropdown">
        <button onclick="toggleDropdown()" id="accountBtn">Account ▼</button>
        <div class="dropdown-content" id="dropdownMenu">
          <a href="#">Profile</a>
          <a href="#">My Playlists</a>
          <a href="#">Settings</a>
          <a href="#">Notifications</a>
          <a href="#">Help Center</a>
          <a href="#">Logout</a>
        </div>
      </div>
    </div>

  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content">

    <h1>Welcome</h1>
    <p>Listen, upload, download and enjoy the Malawian music.</p>

    <h2>Latest Uploaded Music</h2>

    <div id="musicList">
      No music uploaded yet. Be the first to upload.
    </div>

  </div>

</div>

<script>

/* Dropdown */
function toggleDropdown(){
  document.getElementById("dropdownMenu").classList.toggle("show");
}

window.onclick = function(event) {
  if (!event.target.matches('#accountBtn')) {
    var dropdown = document.getElementById("dropdownMenu");
    if (dropdown.classList.contains('show')) {
      dropdown.classList.remove('show');
    }
  }
}

/* LOAD MUSIC FROM SERVER */
async function loadMusic(){

  try{
    const response = await fetch("/music"); 
    const songs = await response.json();

    const musicList = document.getElementById("musicList");
    musicList.innerHTML = "";

    if(songs.length === 0){
      musicList.innerHTML = "No music uploaded yet.";
      return;
    }

    songs.forEach((song) => {
      const div = document.createElement("div");
      div.className = "song";

      const cover = song.cover || "https://via.placeholder.com/250x150?text=Music";

      div.innerHTML = `
        <img src="${cover}" alt="${song.title} cover">
        <div class="song-info">
          <b>${song.title}</b>
          <span>${song.artist}</span>
          <audio controls>
            <source src="/uploads/${song.filename}" type="audio/mpeg">
          </audio>
        </div>
      `;

      musicList.appendChild(div);
    });

  } catch(err){
    console.error("Error loading music:", err);
  }

}

loadMusic();

</script>
</body>
</html>
